<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AhoorQuiz PRO v4.1 - Elite Gaming</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --glow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            background-attachment: scroll;
            /* fixed breaks on iOS Safari */
            color: var(--text);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            /* fix iOS Safari 100vh bug */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            /* smooth scrolling on iOS */
            padding: 40px 0;
            padding-bottom: env(safe-area-inset-bottom, 40px);
            /* iPhone notch support */
        }

        #root {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .card {
            background: var(--glass);
            -webkit-backdrop-filter: blur(30px);
            /* Safari */
            backdrop-filter: blur(30px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.9), var(--glow);
            -webkit-animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            animation: sweep 3s infinite linear;
        }

        @keyframes sweep {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1.1rem;
            font-family: 'Outfit', sans-serif;
            /* Firefox doesn't inherit font in inputs */
            transition: all 0.3s ease;
            -webkit-appearance: none;
            /* remove iOS/Safari default styling */
            appearance: none;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            /* Firefox doesn't inherit font in buttons */
            cursor: pointer;
            -webkit-appearance: none;
            /* remove Safari default button styling */
            appearance: none;
            -webkit-tap-highlight-color: transparent;
            /* remove tap flash on mobile */
            touch-action: manipulation;
            /* faster tap response on mobile */
            transition: -webkit-transform 0.2s, transform 0.2s, box-shadow 0.2s;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 2rem;
        }

        .option-btn {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border-radius: 16px;
        }

        .bet-chips {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 1.5rem;
        }

        .chip {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            -webkit-transition: all 0.3s;
            transition: all 0.3s;
        }

        .chip.active {
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .pin-display {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 0.5rem;
            text-align: center;
            color: var(--accent);
            margin: 1rem 0;
        }

        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.05);
        }

        .creator-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .type-badge {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 4px;
            background: var(--primary);
            text-transform: uppercase;
            font-weight: 800;
        }

        .option-input {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 5px;
        }

        .option-input input[type="checkbox"],
        .option-input input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            // Persist critical state in localStorage (except view, to ensure cool landing)
            const [view, setView] = useState('join');
            const [pin, setPin] = useState(() => localStorage.getItem('ahoor_pin') || '');
            const [nickname, setNickname] = useState(() => localStorage.getItem('ahoor_nickname') || '');
            const [isHost, setIsHost] = useState(() => localStorage.getItem('ahoor_isHost') === 'true');

            useEffect(() => {
                if (pin) localStorage.setItem('ahoor_pin', pin);
                else localStorage.removeItem('ahoor_pin');
            }, [pin]);
            useEffect(() => localStorage.setItem('ahoor_nickname', nickname), [nickname]);
            useEffect(() => localStorage.setItem('ahoor_isHost', isHost), [isHost]);

            // Clear old layout cycle keys and force fresh start
            useEffect(() => {
                localStorage.removeItem('ahoor_layout_cycle');
                localStorage.removeItem('ahoor_view');
            }, []);


            const [socket, setSocket] = useState(null);
            const [gameData, setGameData] = useState({ players: [], question: null, score: 0, leaderboard: [], title: '' });
            const [bet, setBet] = useState(0);
            const [status, setStatus] = useState(null);
            const [quizzes, setQuizzes] = useState([]);
            const [currentQuiz, setCurrentQuiz] = useState({ id: null, title: '', questions: [] });
            const [slideIdx, setSlideIdx] = useState(0);
            const [openAnswer, setOpenAnswer] = useState('');
            const [answeredCount, setAnsweredCount] = useState(0);
            const [isQuickPlay, setIsQuickPlay] = useState(false);


            useEffect(() => {
                // reconnection: false prevents Socket.IO from auto-reconnecting and replaying buffered emits
                const newSocket = io({ reconnection: false });
                setSocket(newSocket);

                newSocket.on('connect', () => console.log('DEBUG: Socket connected!', newSocket.id));
                newSocket.on('error', (err) => {
                    console.error('DEBUG: Socket Error', err);
                    alert('Error: ' + err.message);
                    if (err.message === 'Invalid PIN') {
                        localStorage.removeItem('ahoor_pin');
                        setView('join');
                    }
                });

                newSocket.on('all_quizzes', (data) => setQuizzes(data.quizzes));
                newSocket.on('game_created', (data) => {
                    setPin(data.pin);
                    setGameData(prev => ({ ...prev, title: data.title }));
                    setIsHost(true);
                    setView('lobby');
                });
                newSocket.on('join_success', (data) => {
                    setPin(data.pin);
                    setIsHost(false);
                    setView('lobby');
                });
                newSocket.on('player_joined', (data) => { setGameData(prev => ({ ...prev, players: data.players })); });

                newSocket.on('next_question', (data) => {
                    setGameData(prev => ({ ...prev, question: data }));
                    setStatus(null); setBet(0); setMultiAnswers([]); setOpenAnswer(''); setAnsweredCount(0);
                    setView('question');
                });

                newSocket.on('answer_received', (data) => {
                    if (data.is_host_update) {
                        setAnsweredCount(data.count);
                    } else {
                        setStatus(data); setGameData(prev => ({ ...prev, score: data.new_score })); setView('wait');
                    }
                });

                newSocket.on('update_leaderboard', (data) => {
                    setGameData(prev => ({ ...prev, leaderboard: data.leaderboard }));
                });

                newSocket.on('game_over', () => {
                    console.log('DEBUG: Game Over - disconnecting socket and clearing state');
                    // Physically disconnect the socket so it can NEVER reconnect or replay events
                    newSocket.disconnect();
                    // Clear stored game session so page reload starts fresh
                    localStorage.removeItem('ahoor_pin');
                    localStorage.removeItem('ahoor_isHost');
                    setPin('');
                    setIsHost(false);
                    setView('gameOver');
                });

                // Only re-join if we have a stored pin AND game hasn't ended
                const storedPin = localStorage.getItem('ahoor_pin');
                if (storedPin) {
                    newSocket.emit('join_game', {
                        pin: storedPin,
                        nickname: localStorage.getItem('ahoor_nickname') || 'Guest',
                        is_host: localStorage.getItem('ahoor_isHost') === 'true'
                    });
                }

                return () => newSocket.close();
            }, []);

            const joinGame = () => {
                if (!pin) return alert('Please enter a Game PIN');
                if (!nickname) return alert('Please enter a Nickname');
                socket.emit('join_game', { pin: pin.toString(), nickname });
            };
            const createGame = (quizId) => {
                if (!socket) return alert('Connecting to server... please wait.');
                socket.emit('create_game', { quiz_id: quizId });
            };
            const startGame = () => {
                if (!pin) return alert('Game PIN missing!');
                socket.emit('start_game', { pin: pin.toString() });
            };
            const proceedNext = () => { socket.emit('next_question', { pin: pin.toString() }); };
            const deleteQuiz = (quizId) => { if (confirm('Are you sure you want to delete this quiz?')) socket.emit('delete_quiz', { quiz_id: quizId }); };
            const editQuiz = (quiz) => { setCurrentQuiz({ ...quiz }); setSlideIdx(0); setView('creator'); };
            const exportQuiz = (quiz) => {
                const data = JSON.stringify(quiz, null, 2);
                // Cross-browser clipboard: try modern API first, fall back to execCommand
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(data).catch(() => fallbackCopy(data));
                } else {
                    fallbackCopy(data);
                }
                alert('Quiz JSON copied to clipboard! 📋 You can share this code with anyone.');
            };
            const fallbackCopy = (text) => {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
                document.body.appendChild(ta);
                ta.focus(); ta.select();
                try { document.execCommand('copy'); } catch (e) { console.warn('Copy failed', e); }
                document.body.removeChild(ta);
            };
            const importQuiz = () => {
                const raw = prompt('Paste your Quiz JSON or CSV here:');
                if (!raw) return;
                try {
                    let quiz;
                    if (raw.trim().startsWith('{') || raw.trim().startsWith('[')) {
                        const parsed = JSON.parse(raw);
                        // Handle array vs object
                        if (Array.isArray(parsed)) {
                            quiz = { title: "Imported JSON Quiz", questions: parsed };
                        } else {
                            quiz = parsed;
                        }

                        // Normalize questions to internal format
                        if (quiz.questions && Array.isArray(quiz.questions)) {
                            quiz.questions = quiz.questions.map(q => {
                                let options = q.options;
                                let answer = q.answer || q.Answer || q.correctAnswer || q.CorrectAnswer;
                                let qType = q.type || "";

                                // If options is an object (A, B, C, D style), convert to array
                                if (options && typeof options === 'object' && !Array.isArray(options)) {
                                    const keys = Object.keys(options).sort();
                                    const optionsArray = keys.map(k => options[k]);
                                    // Map answer key (e.g. "A") to its value
                                    if (typeof answer === 'string') {
                                        const cleanKey = answer.trim().toUpperCase();
                                        if (options[cleanKey]) answer = options[cleanKey];
                                        else if (options[answer]) answer = options[answer];
                                    }
                                    options = optionsArray;
                                }

                                // Normalize types to app-internal types
                                let type = qType.toLowerCase();
                                if (type === 'single' || type === 'multi') type = 'multi';
                                else if (type === 'boolean' || type === 'tf' || type === 't/f') type = 'tf';
                                else if (type === 'multi-select') type = 'multi-select';
                                else if (type === 'open') type = 'open';
                                else {
                                    // Infer type if missing or unknown
                                    if (Array.isArray(options) && options.length > 0) {
                                        const isTF = (options.length === 2 && options.every(o => ['True', 'False', 'Yes', 'No'].includes(o)));
                                        type = isTF ? 'tf' : 'multi';
                                    } else {
                                        type = 'open';
                                    }
                                }

                                return {
                                    ...q,
                                    type,
                                    question: q.question || "Untitled Question",
                                    options: Array.isArray(options) ? options : [],
                                    answer: answer !== undefined ? answer : ""
                                };
                            });
                        }
                    } else {
                        // Smart CSV Parser
                        const lines = raw.split('\n')
                            .map(l => l.replace(/\\$/, '').trim())
                            .filter(l => l && !l.startsWith('{') && !l.startsWith('\\'));

                        const headerIdx = lines.findIndex(l => l.toLowerCase().includes('question'));
                        if (headerIdx === -1) throw new Error('Not a valid Quiz JSON or CSV format.');

                        quiz = { title: "Imported CSV Quiz", questions: [] };
                        lines.slice(headerIdx + 1).forEach(line => {
                            const parts = line.split(',');
                            if (parts.length < 2) return;
                            const qText = parts[0];
                            const ansRaw = parts[parts.length - 1];
                            const optionsRaw = parts.slice(1, -1);
                            let options = [];
                            optionsRaw.forEach(p => {
                                if (p.match(/^\d+$/) || !p) {
                                    if (options.length > 0) options[options.length - 1] += "," + p;
                                } else {
                                    options.push(p);
                                }
                            });
                            options = options.slice(0, 4);
                            while (options.length < 4) options.push("");
                            const ansMap = { 'A': 0, 'B': 1, 'C': 2, 'D': 3 };
                            const ansIdx = ansMap[ansRaw.toUpperCase()] ?? 0;
                            quiz.questions.push({
                                type: 'multi',
                                question: qText,
                                options: options,
                                answer: options[ansIdx] || options[0]
                            });
                        });
                    }

                    if (!quiz || !quiz.questions || quiz.questions.length === 0) throw new Error('No questions found');

                    // Strip ID to force create new on backend
                    const { id, ...cleanQuiz } = quiz;
                    socket.emit('save_quiz', { quiz: cleanQuiz });
                    alert('Quiz imported successfully! 🚀');
                } catch (e) {
                    console.error('Import Error:', e);
                    alert('Import Error: ' + e.message);
                }
            };

            const [multiAnswers, setMultiAnswers] = useState([]);
            const submitAnswer = (option) => {
                if (gameData.question.type === 'multi-select') {
                    const newAnswers = multiAnswers.includes(option)
                        ? multiAnswers.filter(a => a !== option)
                        : [...multiAnswers, option];
                    setMultiAnswers(newAnswers);
                } else {
                    console.log('DEBUG: Submitting answer', { pin, answer: option, bet });
                    socket.emit('submit_answer', { pin, answer: option, bet });
                }
            };

            const submitMulti = () => {
                socket.emit('submit_answer', { pin, answer: multiAnswers, bet });
                setMultiAnswers([]);
            };

            const saveQuiz = () => {
                if (!currentQuiz.title || currentQuiz.questions.length === 0) return alert('Please add a title and questions');
                // Ensure at least one answer is selected for each question
                const invalid = currentQuiz.questions.find(q => !q.answer || (Array.isArray(q.answer) && q.answer.length === 0));
                if (invalid) return alert('Each question needs at least one correct answer selected');

                socket.emit('save_quiz', { quiz: currentQuiz });
                setView('quizList');
            };

            const addQuestion = (type) => {
                const newQ = {
                    type,
                    question: '',
                    options: type === 'tf' ? ['True', 'False'] : ['', '', '', ''],
                    answer: type === 'multi-select' ? [] : ''
                };
                const newQs = [...currentQuiz.questions, newQ];
                setCurrentQuiz(prev => ({ ...prev, questions: newQs }));
                setSlideIdx(newQs.length - 1);
            };

            if (view === 'join') {
                return (
                    <div className="card">
                        <h1>AhoorQuiz</h1>
                        <div className="input-group"><input placeholder="GAME PIN" value={pin} onChange={(e) => setPin(e.target.value)} /></div>
                        <div className="input-group"><input placeholder="NICKNAME" value={nickname} onChange={(e) => setNickname(e.target.value)} /></div>
                        <button onClick={joinGame} style={{ marginBottom: '15px', height: '60px', fontSize: '1.3rem' }}>ENTER ARENA ⚔️</button>
                        <p style={{ textAlign: 'center', margin: '1rem 0', opacity: 0.4 }}>OR DISCOVER</p>
                        <button onClick={() => { setView('quizList'); }} style={{ background: 'transparent', border: '3px solid var(--primary)', height: '60px' }}>HOST A SESSION 👑</button>
                    </div>
                );
            }

            if (view === 'quizList') {
                return (
                    <div className="card" style={{ maxWidth: '1200px', width: '95%' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '2rem' }}>
                            <h1>Quiz Arena</h1>
                            <div style={{ display: 'flex', gap: '10px' }}>
                                <button onClick={importQuiz} style={{ width: 'auto', background: 'rgba(255,255,255,0.05)', border: '1px solid var(--primary)', padding: '0 20px' }}>IMPORT 📤</button>
                                <button onClick={() => { setCurrentQuiz({ id: null, title: '', questions: [] }); setSlideIdx(0); setView('creator'); }} style={{ width: 'auto', background: 'var(--primary)', padding: '0 30px' }}>NEW MISSION ➕</button>
                            </div>
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: '25px' }}>
                            {quizzes.map((q, i) => (
                                <div key={i} className="card" style={{
                                    padding: '30px',
                                    border: '2px solid rgba(99, 102, 241, 0.2)',
                                    borderRadius: '24px',
                                    transition: 'all 0.3s ease',
                                    transform: 'scale(1)',
                                    animation: `slideUp ${0.3 + i * 0.1}s ease-out`,
                                    background: 'rgba(255,255,255,0.02)'
                                }} onMouseEnter={(e) => e.currentTarget.style.transform = 'scale(1.03) translateY(-10px)'} onMouseLeave={(e) => e.currentTarget.style.transform = 'scale(1) translateY(0)'}>
                                    <h2 style={{ color: 'var(--primary)', marginBottom: '10px' }}>{q.title}</h2>
                                    <p style={{ opacity: 0.6, marginBottom: '25px' }}>{q.questions.length} Slide Challenges</p>
                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 60px 60px 60px', gap: '10px' }}>
                                        <button
                                            onClick={() => createGame(q.id)}
                                            style={{ background: 'linear-gradient(to right, #10b981, #059669)', padding: '15px' }}
                                        >
                                            PLAY 🎮
                                        </button>
                                        <button onClick={() => exportQuiz(q)} title="Export" style={{ background: 'rgba(255,255,255,0.05)', border: '1px solid #8b5cf6', borderRadius: '15px' }}>📥</button>
                                        <button onClick={() => editQuiz(q)} title="Edit" style={{ background: 'rgba(255,255,255,0.05)', border: '1px solid var(--primary)', borderRadius: '15px' }}>✏️</button>
                                        <button onClick={() => deleteQuiz(q.id)} title="Delete" style={{ background: 'rgba(239, 68, 68, 0.1)', color: '#ef4444', border: '1px solid #ef4444', borderRadius: '15px' }}>🗑️</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button onClick={() => setView('join')} style={{ marginTop: '2rem', background: 'rgba(255,255,255,0.05)' }}>BACK TO BASE</button>
                    </div>
                );
            }


            if (view === 'creator') {
                const q = currentQuiz.questions[slideIdx];
                return (
                    <div className="card" style={{ maxWidth: '800px', width: '95%' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                            <h1>{currentQuiz.title || 'New Quiz'}</h1>
                            <div style={{ display: 'flex', gap: '10px' }}>
                                <button onClick={() => setView('quizList')} style={{ width: 'auto', background: 'rgba(255,255,255,0.1)' }}>BACK ⬅️</button>
                                <button onClick={saveQuiz} style={{ width: 'auto', background: 'var(--accent)' }}>FINISH QUIZ ✅</button>
                            </div>
                        </div>
                        <div className="input-group">
                            <input
                                placeholder="Quiz Title"
                                value={currentQuiz.title}
                                onChange={(e) => setCurrentQuiz({ ...currentQuiz, title: e.target.value })}
                                style={{ fontSize: '1.5rem', textAlign: 'center' }}
                            />
                        </div>

                        {currentQuiz.questions.length === 0 ? (
                            <div style={{ textAlign: 'center', margin: '3rem 0' }}>
                                <p style={{ opacity: 0.6 }}>Add your first question below!</p>
                            </div>
                        ) : (
                            <div className="question-card">
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '15px' }}>
                                    <span style={{ opacity: 0.6 }}>Slide {slideIdx + 1} of {currentQuiz.questions.length}</span>
                                    <span className="type-badge">{q.type}</span>
                                </div>

                                <input
                                    className="input-group"
                                    placeholder="Type question here..."
                                    value={q.question}
                                    onChange={(e) => {
                                        const newQs = [...currentQuiz.questions];
                                        newQs[slideIdx].question = e.target.value;
                                        setCurrentQuiz({ ...currentQuiz, questions: newQs });
                                    }}
                                    style={{ fontSize: '1.2rem' }}
                                />

                                <div style={{ marginTop: '10px', opacity: 0.8, fontSize: '0.8rem', marginBottom: '5px' }}>MARK CORRECT ANSWERS</div>
                                {q.type !== 'open' ? (
                                    <div className="options-grid" style={{ marginTop: '10px' }}>
                                        {q.options.map((opt, oIndex) => (
                                            <div key={oIndex} style={{
                                                background: ['rgba(239, 68, 68, 0.2)', 'rgba(59, 130, 246, 0.2)', 'rgba(245, 158, 11, 0.2)', 'rgba(16, 185, 129, 0.2)'][oIndex],
                                                border: (q.type === 'multi-select' ? q.answer.includes(opt) : q.answer === opt)
                                                    ? '3px solid white'
                                                    : '1px solid rgba(255,255,255,0.1)',
                                                borderRadius: '16px',
                                                padding: '10px',
                                                display: 'flex',
                                                alignItems: 'center',
                                                gap: '10px'
                                            }}>
                                                <input
                                                    type={q.type === 'multi-select' ? 'checkbox' : 'radio'}
                                                    checked={q.type === 'multi-select' ? q.answer.includes(opt) : q.answer === opt}
                                                    onChange={() => {
                                                        const newQs = [...currentQuiz.questions];
                                                        if (q.type === 'multi-select') {
                                                            const currentAnswers = Array.isArray(newQs[slideIdx].answer) ? newQs[slideIdx].answer : [];
                                                            if (currentAnswers.includes(opt)) {
                                                                newQs[slideIdx].answer = currentAnswers.filter(a => a !== opt);
                                                            } else {
                                                                newQs[slideIdx].answer = [...currentAnswers, opt];
                                                            }
                                                        } else {
                                                            newQs[slideIdx].answer = opt;
                                                        }
                                                        setCurrentQuiz({ ...currentQuiz, questions: newQs });
                                                    }}
                                                />
                                                <input
                                                    placeholder={`Option ${oIndex + 1}`}
                                                    value={opt}
                                                    onChange={(e) => {
                                                        const newQs = [...currentQuiz.questions];
                                                        const oldVal = newQs[slideIdx].options[oIndex];
                                                        newQs[slideIdx].options[oIndex] = e.target.value;
                                                        if (q.type !== 'multi-select' && newQs[slideIdx].answer === oldVal) newQs[slideIdx].answer = e.target.value;
                                                        setCurrentQuiz({ ...currentQuiz, questions: newQs });
                                                    }}
                                                    style={{ border: 'none', background: 'transparent', padding: '5px' }}
                                                />
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <input placeholder="Type correct answer here..." value={q.answer} onChange={(e) => {
                                        const newQs = [...currentQuiz.questions];
                                        newQs[slideIdx].answer = e.target.value;
                                        setCurrentQuiz({ ...currentQuiz, questions: newQs });
                                    }} />
                                )}

                                <div style={{ display: 'flex', gap: '10px', marginTop: '20px' }}>
                                    <button
                                        disabled={slideIdx === 0}
                                        onClick={() => setSlideIdx(slideIdx - 1)}
                                        style={{ background: 'rgba(255,255,255,0.1)', opacity: slideIdx === 0 ? 0.3 : 1 }}
                                    >
                                        ⬅️ BACK SLIDE
                                    </button>
                                    <button
                                        disabled={slideIdx === currentQuiz.questions.length - 1}
                                        onClick={() => setSlideIdx(slideIdx + 1)}
                                        style={{ background: 'rgba(255,255,255,0.1)', opacity: slideIdx === currentQuiz.questions.length - 1 ? 0.3 : 1 }}
                                    >
                                        NEXT SLIDE ➡️
                                    </button>
                                    <button
                                        onClick={() => {
                                            if (confirm('Delete this slide?')) {
                                                const newQs = currentQuiz.questions.filter((_, i) => i !== slideIdx);
                                                setCurrentQuiz({ ...currentQuiz, questions: newQs });
                                                if (slideIdx > 0) setSlideIdx(slideIdx - 1);
                                            }
                                        }}
                                        style={{ background: '#ef4444', width: 'auto' }}
                                    >
                                        🗑️
                                    </button>
                                </div>
                            </div>
                        )}

                        <div style={{ margin: '1rem 0', textAlign: 'center', fontSize: '0.8rem', opacity: 0.6 }}>ADD A NEW SLIDE TYPE:</div>
                        <div className="options-grid">
                            <button onClick={() => addQuestion('multi')} style={{ background: '#3b82f6' }}>+ MULTI CHOICE</button>
                            <button onClick={() => addQuestion('tf')} style={{ background: '#f59e0b' }}>+ TRUE/FALSE</button>
                            <button onClick={() => addQuestion('multi-select')} style={{ background: '#8b5cf6' }}>+ MULTI SELECT</button>
                            <button onClick={() => addQuestion('open')} style={{ background: '#ec4899' }}>+ OPEN ENDED</button>
                        </div>
                    </div>
                );
            }

            if (view === 'lobby') {
                return (
                    <div className="card">
                        <div style={{ textAlign: 'center' }}><p style={{ opacity: 0.6 }}>PIN: {pin}</p><h1>{gameData.title}</h1></div>
                        <h2>Players ({gameData.players.length})</h2>
                        <div style={{ maxHeight: '200px', overflowY: 'auto', margin: '1rem 0' }}>
                            {gameData.players.map((p, i) => <div key={i} className="leaderboard-row"><span>{p.nickname}</span></div>)}
                        </div>
                        <button onClick={startGame}>Start Game</button>
                    </div>
                );
            }

            if (view === 'question' && gameData.question) {
                return (
                    <div className="card">
                        <div className="stats"><span>Score: {gameData.score}</span><span>Q{gameData.question.index + 1}</span></div>
                        <h2 style={{ textAlign: 'center', marginBottom: '1.5rem' }}>{gameData.question.question}</h2>

                        {isHost ? (
                            <div style={{ textAlign: 'center' }}>
                                <div style={{ fontSize: '3rem', fontWeight: 800, margin: '2rem 0' }}>{answeredCount}</div>
                                <p style={{ opacity: 0.6 }}>Answers Received</p>
                                <button onClick={proceedNext} style={{ marginTop: '2rem' }}>Next Question (Skip)</button>
                            </div>
                        ) : (
                            gameData.question.type === 'open' ? (
                                <div className="input-group">
                                    <input placeholder="Type your answer..." value={openAnswer} onChange={(e) => setOpenAnswer(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') submitAnswer(openAnswer); }} />
                                    <button onClick={() => submitAnswer(openAnswer)} style={{ marginTop: '10px' }}>Submit</button>
                                </div>
                            ) : (
                                <>
                                    <div className="bet-chips">
                                        {[10, 25, 50].map(val => (
                                            <div key={val} className={`chip ${bet === val ? 'active' : ''}`} onClick={() => setBet(val)}>{val}%</div>
                                        ))}
                                    </div>
                                    <div className="options-grid">
                                        {gameData.question.options.map((opt, i) => (
                                            <button key={i} className="option-btn" onClick={() => submitAnswer(opt)}
                                                style={{
                                                    background: ['#ef4444', '#3b82f6', '#f59e0b', '#10b981'][i],
                                                    border: multiAnswers.includes(opt) ? '5px solid white' : 'none'
                                                }}>
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                    {gameData.question.type === 'multi-select' && (
                                        <button onClick={submitMulti} style={{ marginTop: '20px' }}>Submit Selections</button>
                                    )}
                                </>
                            )
                        )}
                    </div>
                );
            }

            if (view === 'wait') {
                return (
                    <div className="card" style={{ textAlign: 'center' }}>
                        <h1 style={{ fontSize: '4rem', marginBottom: '1rem' }}>{status?.is_correct ? '✅' : '❌'}</h1>
                        <h2>{status?.is_correct ? 'Brilliant!' : 'Not quite...'}</h2>
                        <p style={{ fontSize: '1.2rem', margin: '1rem 0' }}>The host will advance to the next slide soon.</p>
                        <p style={{ fontSize: '1.5rem', margin: '1.5rem 0' }}>Current Score: {status?.new_score}</p>
                        {isHost && <button onClick={() => setView('leaderboard')}>Show Scoreboard</button>}
                    </div>
                );
            }

            if (view === 'leaderboard') {
                return (
                    <div className="card">
                        <h1>Standings</h1>
                        <div style={{ margin: '1.5rem 0' }}>
                            {gameData.leaderboard.slice(0, 5).map((p, i) => (
                                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '12px', background: i === 0 ? 'rgba(255,215,0,0.1)' : 'transparent', borderRadius: '8px', marginBottom: '5px' }}>
                                    <span>{i + 1}. {p.nickname}</span>
                                    <span style={{ fontWeight: 800 }}>{p.score}</span>
                                </div>
                            ))}
                        </div>
                        {isHost ? (
                            <button onClick={proceedNext}>Next Question</button>
                        ) : (
                            <p style={{ textAlign: 'center', opacity: 0.6 }}>Waiting for host...</p>
                        )}
                    </div>
                );
            }

            if (view === 'gameOver') {
                const top3 = gameData.leaderboard.slice(0, 3);
                return (
                    <div className="card" style={{ textAlign: 'center' }}>
                        <h1>Final Standings 🏆</h1>
                        <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'flex-end', gap: '10px', margin: '3rem 0', minHeight: '200px' }}>
                            {top3[1] && (
                                <div style={{ background: 'rgba(255,255,255,0.1)', width: '80px', height: '120px', borderRadius: '10px 10px 0 0', display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '10px' }}>
                                    <div style={{ fontSize: '0.8rem', overflow: 'hidden', textOverflow: 'ellipsis' }}>{top3[1].nickname}</div>
                                    <div style={{ fontSize: '1.2rem', fontWeight: 800 }}>2nd</div>
                                </div>
                            )}
                            {top3[0] && (
                                <div style={{ background: 'rgba(255,215,0,0.2)', width: '100px', height: '160px', borderRadius: '10px 10px 0 0', border: '2px solid gold', display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '10px' }}>
                                    <div style={{ fontSize: '1rem', fontWeight: 800, overflow: 'hidden', textOverflow: 'ellipsis' }}>{top3[0].nickname}</div>
                                    <div style={{ fontSize: '1.5rem', fontWeight: 800 }}>1st</div>
                                </div>
                            )}
                            {top3[2] && (
                                <div style={{ background: 'rgba(255,255,255,0.05)', width: '80px', height: '80px', borderRadius: '10px 10px 0 0', display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '10px' }}>
                                    <div style={{ fontSize: '0.7rem', overflow: 'hidden', textOverflow: 'ellipsis' }}>{top3[2].nickname}</div>
                                    <div style={{ fontSize: '1.1rem', fontWeight: 800 }}>3rd</div>
                                </div>
                            )}
                        </div>
                        <p style={{ fontSize: '1.2rem', margin: '1rem 0' }}>Your Final Score: {gameData.score}</p>
                        <button onClick={() => window.location.reload()}>Play Again</button>
                    </div>
                );
            }

            return (
                <div style={{ position: 'fixed', bottom: '10px', right: '10px', opacity: 0.3, fontSize: '0.7rem', pointerEvents: 'none' }}>
                    AhoorQuiz PRO v4.1 - Elite Edition
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
